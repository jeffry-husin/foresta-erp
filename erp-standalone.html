     the app open in a tab or whose browser cached an old copy would keep running an
     outdated build indefinitely — this was the root cause behind menu items (e.g. Master
     Part) intermittently "disappearing" for some users after a deploy: they were seeing

// APP BUILD / AUTO-UPDATE CHECK
// Bump APP_BUILD on every deploy. Even with the no-cache meta tags above, a tab
// that's been left open for hours/days is still running whatever JS it loaded at
// open time — it has no way to know a new version was deployed. This periodically
// re-fetches the live file (bypassing cache) and compares its APP_BUILD string;
// if it's newer, a small banner offers a one-click refresh instead of the user
// silently working on stale code (which is what made bugs like "Master Part
// randomly missing for some users" look inconsistent — they were on old builds).
// ════════════════════════════════════════════════════════════════════════════
const APP_BUILD = "2026-07-15.1";
(function () {
  function showUpdateBanner() {
    if (document.getElementById("app-update-banner")) return;
    const bar = document.createElement("div");
    bar.id = "app-update-banner";
    bar.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:#2563eb;color:#fff;padding:10px 16px;text-align:center;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.25);";
    bar.innerHTML = 'Versi baru aplikasi tersedia (ada pembaruan/perbaikan). <button id="app-update-btn" style="margin-left:10px;background:#fff;color:#2563eb;border:none;border-radius:4px;padding:4px 12px;font-weight:700;cursor:pointer;">Refresh Sekarang</button>';
    document.body.appendChild(bar);
    document.getElementById("app-update-btn").onclick = function () {
      location.reload();
    };
  }
  async function checkForUpdate() {
    try {
      const res = await fetch(location.pathname + "?_v=" + Date.now(), {
        cache: "no-store"
      });
      const text = await res.text();
      const m = text.match(/APP_BUILD\s*=\s*"([^"]+)"/);
      if (m && m[1] && m[1] !== APP_BUILD) showUpdateBanner();
    } catch (e) {/* offline or blocked — ignore, will retry next interval */}
  }
  setInterval(checkForUpdate, 5 * 60 * 1000);
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") checkForUpdate();
  });
})();

// Convert a number into Indonesian words (terbilang), e.g. 1500000 -> "Satu Juta Lima Ratus Ribu Rupiah"
const terbilang = n => {
  n = Math.round(Math.abs(n || 0));
  const satuan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
  const eja = num => {
    num = Math.floor(num);
    if (num < 12) return satuan[num];

    if (num < 100) return eja(Math.floor(num / 10)) + " Puluh" + (num % 10 ? " " + eja(num % 10) : "");

    if (num < 2000) return "Seribu" + (num % 1000 ? " " + eja(num % 1000) : "");

// Compares a document's bomSnapshot (captured at creation time, {unitCode: bomUpdatedAt}) against
// the CURRENT live Master Unit records. Returns the list of unitCodes whose BOM has since been
// revised (empty array = nothing changed). Used to power a non-blocking warning badge on
// SalesOrder/ItemRequisition — never used to auto-mutate any document.
const bomRevisedUnits = (bomSnapshot, units) => {
  if (!bomSnapshot) return [];
  return Object.keys(bomSnapshot).filter(unitCode => {
    const unit = (units || []).find(u => u.unitCode === unitCode);
    const currentStamp = unit?.bomUpdatedAt || null;
    return currentStamp !== bomSnapshot[unitCode];
  });
};
// Unified document-numbering format used across the whole app: TYPE-000-FRT-ROMAN-YEAR
// (e.g. "SO-001-FRT-VII-2026"). The sequence resets to 001 every calendar month per document
// type. `arr` must be the freshest array of existing records of that type (matching the
// collision-safe max-seq pattern already used elsewhere) so concurrent creation across browsers
// can't produce a duplicate number; `numberField` defaults to "nomor" (Cuti stores its number in
// "id" instead).
const DOC_ROMAN_MONTHS = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
const genDocNumber = (arr, typeCode, numberField = "nomor") => {
  const now = new Date();
  const prefix = typeCode + "-";
  const suffix = `-FRT-${DOC_ROMAN_MONTHS[now.getMonth()]}-${now.getFullYear()}`;
  const maxSeq = (arr || []).reduce((max, r) => {
    const val = r && r[numberField];
    if (val && val.startsWith(prefix) && val.endsWith(suffix)) {
      const n = parseInt(val.slice(prefix.length, val.length - suffix.length), 10);
      if (!isNaN(n) && n > max) return n;
    }
    return max;
  }, 0);
  return `${prefix}${String(maxSeq + 1).padStart(3, "0")}${suffix}`;
};
// Same numbering scheme as genDocNumber, but anchored to an explicit date instead of "now" and
// fed by a shared running-counter object instead of scanning an array — used only by the
// one-time legacy-number migration (see buildDocNumberMigrationPlan below) so a document that
// actually happened in the past keeps a number reflecting that period, not the migration date.
const genDocNumberForDate = (dateStr, typeCode, seqCounters) => {
  const d = dateStr ? new Date(dateStr + "T00:00:00") : new Date();
  const valid = !isNaN(d.getTime());
  const month = valid ? d.getMonth() : new Date().getMonth();
  const year = valid ? d.getFullYear() : new Date().getFullYear();
  const prefix = typeCode + "-";
  const suffix = `-FRT-${DOC_ROMAN_MONTHS[month]}-${year}`;
  const key = prefix + suffix;
  const next = (seqCounters[key] || 0) + 1;
  seqCounters[key] = next;
  return `${prefix}${String(next).padStart(3, "0")}${suffix}`;
};
// True if a nomor/id already matches the unified TYPE-000-FRT-ROMAN-YEAR format (optionally with
// a "-R#" revision suffix) — used by the legacy-number migration to find what still needs
// migrating. Only checks shape, not whether the year looks plausible (see anomaly check in
// CompanySettingsModule's migration preview for that).
const isUnifiedDocNumber = (val, typeCode) => {
  if (!val) return true; // nothing to migrate
  const re = new RegExp(`^${typeCode}-\\d{3}-FRT-(I|II|III|IV|V|VI|VII|VIII|IX|X|XI|XII)-\\d{4}(-R\\d+)?$`);
  return re.test(val);
};
// Whole-day difference between a stored date string and today, for stale/follow-up checks.
const daysSince = dateStr => {
  if (!dateStr) return 0;
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d.getTime())) return 0;
  return Math.floor((new Date(today() + "T00:00:00") - d) / 86400000);
};

// Backward-compat normalizer: older Part Recommendation records (pre-migration) were stored as
// 1 record per item ({ partNumber, partName, qty, alasan }) instead of 1 doc per visit with items[].
// This converts any legacy record on read so old localStorage data never crashes the new UI.
function normalizePartRec(r) {
  if (!r) return r;
  if (Array.isArray(r.items)) return r;
  return {
    ...r,
    items: [{
      partNumber: r.partNumber,
      partName: r.partName,
      qty: r.qty,
      alasan: r.alasan
    }]
  };
}
function normalizePartRecs(list) {
  return (list || []).map(normalizePartRec);
}

// EXCEL EXPORT / IMPORT — uses SheetJS (XLSX), loaded dynamically from CDN once.
// ════════════════════════════════════════════════════════════════════════════
let _xlsxLoadPromise = null;
function loadXLSXLibrary() {
  if (typeof window !== "undefined" && window.XLSX) return Promise.resolve(window.XLSX);
  if (_xlsxLoadPromise) return _xlsxLoadPromise;
  _xlsxLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js";
    script.onload = () => resolve(window.XLSX);
    script.onerror = () => reject(new Error("Gagal memuat library Excel. Pastikan ada koneksi internet."));
    document.head.appendChild(script);
  });
  return _xlsxLoadPromise;
}

// Export an array of row-objects (each object = 1 row, keys = column headers) to an .xlsx file
async function exportToExcel(rows, filename, sheetName = "Sheet1") {
  try {
    const XLSX = await loadXLSXLibrary();
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename.endsWith(".xlsx") ? filename : filename + ".xlsx");
  } catch (e) {
    alert("Gagal export: " + e.message);
  }
}

// Download an empty template with just header row, matching given column list
async function downloadTemplate(headers, filename) {

    const ws = XLSX.utils.aoa_to_sheet([headers]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Template");

// Read an uploaded .xlsx/.csv File object, return array of row-objects (first row = headers)
function readExcelFile(file) {
  return new Promise(async (resolve, reject) => {
    try {
      const XLSX = await loadXLSXLibrary();
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, {
            type: "array"
          });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, {
            defval: ""
          });
          resolve(rows);
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = () => reject(new Error("Gagal membaca file"));
      reader.readAsArrayBuffer(file);
    } catch (e) {
      reject(e);
    }
  });
}

// Parse a raw weekly fingerprint-machine export ("LAP REKAPITULASI - [tgl] - [tgl].xls") into a
// {periode, karyawan[]} structure. The machine's layout is fixed by row/column position (not
// named headers), so this reads in array mode (header:1) instead of the object-mode
// readExcelFile above. See AttendanceModule's "Rekap Mesin" tab for how this feeds the
// national-holiday / dinas-luar correction step.
function parseMesinAbsensiXLS(file) {
  return new Promise(async (resolve, reject) => {
    try {
      const XLSX = await loadXLSXLibrary();
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {
            type: "array"
          });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const raw = XLSX.utils.sheet_to_json(sheet, {
            header: 1,
            defval: 0
          });
          // Periode: row 2, col 27 — e.g. " Dari 09-06-2026 s/d 15-06-2026"
          const periodeStr = String(raw[2]?.[27] || "");
          const match = periodeStr.match(/(\d{2}-\d{2}-\d{4}).*?(\d{2}-\d{2}-\d{4})/);
          const periode = match ? {
            mulai: match[1].split("-").reverse().join("-"),
            selesai: match[2].split("-").reverse().join("-")
          } : {
            mulai: "",
            selesai: ""
          };
          // Data karyawan mulai row 12, berhenti di baris "Total:" / "Grand Total:" / baris kosong
          const karyawan = [];
          for (let i = 12; i < raw.length; i++) {
            const row = raw[i] || [];
            const nama = String(row[1] || "").trim();
            if (!nama || nama.startsWith("Total") || nama.startsWith("Grand")) break;
            karyawan.push({
              nama,
              karyawanId: String(row[6] || ""),
              normal: Number(row[10]) || 0,
              riil: Number(row[11]) || 0,
              absen: Number(row[12]) || 0,
              terlambat: Number(row[14]) || 0,
              plgCpt: Number(row[15]) || 0,
              lembur: Number(row[17]) || 0,
              jmlIjin: Number(row[18]) || 0,
              dLuar: Number(row[19]) || 0,
              nIn: Number(row[22]) || 0,
              nOut: Number(row[23]) || 0,
              scan: Number(row[24]) || 0,
              sakit: Number(row[25]) || 0,
              cuti: Number(row[26]) || 0,
              ijin: Number(row[28]) || 0,
              jamKerja: Number(row[32]) || 0
            });
          }
          resolve({
            periode,
            karyawan
          });
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = () => reject(new Error("Gagal membaca file"));
      reader.readAsArrayBuffer(file);
    } catch (e) {
      reject(e);
    }
  });
}

// Correction algorithm for the weekly machine export. HRD supplies `hariLibur` (count of national
// holidays inside the period — the machine always counts these as normal work days) and, per
// employee who needs it, a `penyesuaian` row (dinas luar days, and/or overrides for ijin/cuti/
// sakit/normal/absen that the machine didn't capture correctly).
//
// Key subtlety validated against real HRD-corrected weekly data: days spent on dinas luar
// (off-site duty) are NOT a "leave" category that reduces attendance — the employee was working,
// the machine just has no scan for them. So dLuar is added back into Riil (present) rather than
// subtracted from Normal like Cuti/Ijin/Sakit are. And when an employee is on dinas luar for the
// *entire* period (dLuar >= raw Normal), Normal itself isn't reduced by hariLibur either, since
// off-site work isn't affected by an office holiday. A manual "Normal Override" input still wins
// over both of these if HRD explicitly sets one.
function hitungKoreksiAbsensi(karyawan, hariLibur, penyesuaian) {
  const liburNum = Number(hariLibur) || 0;
  const numOrNull = v => v !== "" && v !== null && v !== undefined && !Number.isNaN(Number(v)) ? Number(v) : null;
  return (karyawan || []).map(k => {
    const p = (penyesuaian || []).find(row => String(row.nama || "").toLowerCase().trim() === k.nama.toLowerCase().trim()) || {};
    const dLuar = numOrNull(p.dLuar) || 0;
    const cutiEdit = numOrNull(p.cuti) ?? k.cuti;
    const jmlIjinEdit = k.jmlIjin; // not exposed for manual override in the current UI (raw only)
    const ijinEdit = numOrNull(p.ijin) ?? k.ijin;
    const sakitEdit = numOrNull(p.sakit) ?? k.sakit;
    const otherLeave = cutiEdit + jmlIjinEdit + ijinEdit + sakitEdit;
    const normalOverride = numOrNull(p.normalOverride);
    const fullDinasLuar = dLuar > 0 && dLuar >= k.normal;
    const normalEdit = normalOverride !== null ? normalOverride : fullDinasLuar ? k.normal : Math.max(0, k.normal - liburNum);
    const riilCapped = Math.min(k.riil, Math.max(0, normalEdit - dLuar - otherLeave));
    const riilEdit = riilCapped + dLuar;
    const absenManual = numOrNull(p.absenManual);
    const absenEdit = absenManual !== null ? absenManual : Math.max(0, normalEdit - riilEdit - otherLeave);
    // Portion of this employee's total lemburJam (from the machine, weekly aggregate — no
    // day-by-day breakdown available) that HRD says happened on a hari libur/istirahat mingguan,
    // for the legal overtime-pay multiplier table (see hitungLemburLegal). Defaults to 0 (all
    // overtime treated as regular working-day overtime), capped so it never exceeds the raw total.
    const lemburLiburEdit = Math.min(numOrNull(p.lemburLibur) || 0, k.lembur);
    return {
      ...k,
      normalEdit,
      riilEdit,
      absenEdit,
      dLuarEdit: dLuar,
      cutiEdit,
      jmlIjinEdit,
      ijinEdit,
      sakitEdit,
      lemburLiburEdit
    };
  });
}

// Legal overtime-pay calculation per PP No. 35 Tahun 2021 Pasal 31-32 (Indonesian Government
// Regulation on overtime), sourced and verified against the current regulation text:
//   - Upah sejam (hourly rate) = upah sebulan / 173  (Pasal 32 ayat 1-2)
//   - Hari kerja biasa (regular working day): jam ke-1 = 1.5x upah sejam, jam berikutnya = 2x
//   - Hari libur resmi / istirahat mingguan (Pasal 31), sistem 6 hari kerja/minggu:
//       jam 1-7 = 2x, jam 8 = 3x, jam 9-11 = 4x
//   - Hari libur resmi / istirahat mingguan, sistem 5 hari kerja/minggu:
//       jam 1-8 = 2x, jam 9 = 3x, jam 10-12 = 4x
//   - Legal max: 4 jam/hari, 18 jam/minggu (Pasal 26 ayat 1) — the machine only reports a weekly

function usePersisted(key, defaultVal) {
  const [val, setValRaw] = useState(defaultVal);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    let cancelled = false;
    authReadyPromise.then(async () => {
      if (cancelled) return;
      try {
        const {
          data,
          error
        } = await sb.from("erp_data").select("data").eq("key", key).maybeSingle();
        if (cancelled) return;
        if (!error && data) {
          setValRaw(data.data);
        } else {
          // First time this key has ever been used — seed it with the default.
          await sb.from("erp_data").upsert({
            key,
            data: defaultVal,
            updated_at: new Date().toISOString()
          }, {
            onConflict: "key",
            ignoreDuplicates: true
          });
          if (!cancelled) setValRaw(defaultVal);
        }
      } finally {
        if (!cancelled) setLoaded(true);
      }
    });
    return () => {
      cancelled = true;
    };
  }, [key]);
  // IMPORTANT — concurrent-write safety: when multiple users edit the same collection at the same
  // time (e.g. two people creating an Item Requisition within seconds of each other), each browser
  // only knows about its own last-loaded copy of the array. If we just merged against that local
  // copy and blindly upserted, whoever writes second silently wipes out whoever wrote first (their
  // whole document vanishes — this is exactly the "previous IR got rewritten" bug). To close that
  // window, whenever the caller passes an updater FUNCTION (the `prev => ...` form) we re-fetch the
  // current server data immediately before applying it and writing back, instead of trusting the
  // (possibly stale) local React state. Callers that still pass a plain value skip this and behave
  // as before — so every "create a new record" call site should use the function form.
  const setVal = v => {
    // Optimistic local update so the UI feels instant; this may be superseded a moment later once
    // the fresh-fetch reconciliation below finishes.
    setValRaw(prev => typeof v === "function" ? v(prev) : v);
    (async () => {
      try {
        let basePrev = val;
        if (typeof v === "function") {
          const {
            data,
            error: fetchError
          } = await sb.from("erp_data").select("data").eq("key", key).maybeSingle();
          if (!fetchError && data) basePrev = data.data;
        }
        const next = typeof v === "function" ? v(basePrev) : v;
        const {
          error
        } = await sb.from("erp_data").upsert({
          key,
          data: next,
          updated_at: new Date().toISOString()
        }, {
          onConflict: "key"
        });
        if (error) {
          console.error("Gagal menyimpan " + key + ":", error);
        } else {
          setValRaw(next);
        }
      } catch (e) {
        console.error("Gagal menyimpan " + key + ":", e);
      }
    })();
  };
  return [val, setVal, loaded];
}

// Generic helper: submit a pending change (add/edit/delete) for GM approval.
// module = "Database Client" | "Master Part"; action = "Tambah" | "Edit" | "Hapus"
function submitEditRequest(store, session, {
  module,
  action,
  targetId,
  targetLabel,
  payload,
  approverLabel = "GM"
}) {
  const req = {
    id: "ER-" + uid(),
    module,
    action,
    targetId,
    targetLabel,
    payload,
    requestedBy: session.nama,
    tanggal: today(),
    status: `Menunggu Approval ${approverLabel}`
  };
  store.setEditRequests([...store.editRequests, req]);
  // Log the submission itself (not just the eventual approve/reject) so Audit Trail shows
  // every creation/edit attempt as it happens, not only once GM has decided on it.
  logAudit(store, session, {
    module,
    docNomor: targetLabel,
    action: `Ajukan ${action}`,
    detail: "Menunggu approval GM"
  });
  return req;
}

// Global audit log helper — call this whenever an approval/rejection decision happens.
// Usage: logAudit(store, session, { module: "Quotation Unit", docNomor: q.nomor, action: "Approve", detail: "..." })
function logAudit(store, session, {
  module,
  docNomor,
  action,
  detail
}) {
  const entry = {
    id: "LOG-" + uid(),
    timestamp: new Date().toISOString(),
    module,
    docNomor,
    action,
    detail: detail || "",
    actorNama: session.nama,
    actorRole: session.role
  };
  store.setAuditLog([...store.auditLog, entry]);
}

    quotationsPS: store.setQuotationsPS,

    itemRequisitions: store.setItemRequisitions,
    poLocal: store.setPoLocal,
    poOverseas: store.setPoOverseas,
    goodsReceipts: store.setGoodsReceipts,
    deliveryOrders: store.setDeliveryOrders,
    tickets: store.setTickets,
    leaveRequests: store.setLeaveRequests,

    basts: store.setBasts,
    inspectionReports: store.setInspectionReports,
    invoices: store.setInvoices,
    internalDOs: store.setInternalDOs,

// ════════════════════════════════════════════════════════════════════════════
// CASCADING REVISION — when a Quotation is revised, walk the downstream document
// chain (SO -> IR -> PO) and flag every linked record with a manual-review alert.
// Per standing instruction, this NEVER silently rewrites items/pricing on a live
// commercial document (SO items may be a hand-picked subset of the quotation, PO
// pricing may already be negotiated/approved, etc.) — it only surfaces a clear
// notification so the responsible user can check and adjust manually. Documents
// that are already locked (shipped, invoiced Lunas, marked selesai) get a more
// urgent wording making clear they were NOT auto-changed.

function cascadeQuotationRevision(store, session, {

  const affectedSOs = store.salesOrders.filter(so => chainNomors.includes(so.sourceNomor));
  if (affectedSOs.length === 0) return;
  const soIsLocked = so => {
    const hasShipment = store.deliveryOrders.some(d => d.soNomor === so.nomor);
    const hasLunasInvoice = store.invoices.some(i => i.soNomor === so.nomor && i.statusBayar === "Lunas");
    return hasShipment || hasLunasInvoice || !!so.selesaiManual;
  };
  const mkAlert = locked => ({
    message: locked ? `Quotation sumber (${oldNomor}) direvisi menjadi ${newNomor}. Dokumen ini sudah berjalan (ada pengiriman / invoice lunas / ditandai selesai) sehingga TIDAK diubah otomatis — mohon cek manual apakah perlu penyesuaian.` : `Quotation sumber (${oldNomor}) direvisi menjadi ${newNomor}. Mohon cek apakah dokumen ini perlu disesuaikan mengikuti revisi tersebut.`,
    fromNomor: oldNomor,
    toNomor: newNomor,
    flaggedAt: new Date().toISOString()
  });
  const soArr = [...store.salesOrders];
  const irArr = [...store.itemRequisitions];
  const poLocalArr = [...store.poLocal];
  const poOverseasArr = [...store.poOverseas];
  const auditEntries = [];
  affectedSOs.forEach(so => {
    const locked = soIsLocked(so);
    const idx = soArr.findIndex(s => s.nomor === so.nomor);
    if (idx >= 0) {
      soArr[idx] = {
        ...soArr[idx],
        cascadeAlert: mkAlert(locked)
      };
      auditEntries.push({
        module: "Sales Order",
        docNomor: so.nomor,
        action: "Cascade: Perlu Review Manual",
        detail: `Quotation ${oldNomor} -> ${newNomor}${locked ? " (SO sudah berjalan)" : ""}`
      });
    }
    const linkedIRs = irArr.filter(ir => ir.soNomor === so.nomor);
    linkedIRs.forEach(ir => {
      const irIdx = irArr.findIndex(x => x.nomor === ir.nomor);
      if (irIdx >= 0) {
        irArr[irIdx] = {
          ...irArr[irIdx],
          cascadeAlert: mkAlert(locked)
        };
        auditEntries.push({
          module: "Item Requisition",
          docNomor: ir.nomor,
          action: "Cascade: Perlu Review Manual",
          detail: `Terkait revisi Quotation ${oldNomor} -> ${newNomor} via SO ${so.nomor}`
        });
      }
      [["Purchase Order Lokal", poLocalArr], ["Purchase Order Overseas", poOverseasArr]].forEach(([label, arr]) => {
        arr.forEach((po, pIdx) => {
          if ((po.irNomors || []).includes(ir.nomor) && po.status !== "Sudah Diterima") {
            arr[pIdx] = {
              ...arr[pIdx],
              cascadeAlert: mkAlert(locked)
            };
            auditEntries.push({
              module: label,
              docNomor: po.nomor,
              action: "Cascade: Perlu Review Manual",
              detail: `Terkait revisi Quotation ${oldNomor} -> ${newNomor} via IR ${ir.nomor}`
            });
          }
        });
      });
    });
  });
  store.setSalesOrders(soArr);
  store.setItemRequisitions(irArr);
  store.setPoLocal(poLocalArr);
  store.setPoOverseas(poOverseasArr);
  auditEntries.forEach(e => logAudit(store, session, e));
}

// REQUEST PART BARU — Mekanik -> Asil review -> GM approval -> enters Master Part
// ════════════════════════════════════════════════════════════════════════════
function PartRequestModule({
  store,
  session
}) {
  const {
    partRequests,
    setPartRequests,
    parts,
    setParts
  } = store;
  const isMekanik = session.role === "mekanik";
  const isAsil = session.role === "service_manager";
  const isApprover = session.role === "owner" || session.role === "gm" || session.role === "finance_director"; // HO1/HO2/HO3 super-user parity
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({
    partNumber: "",
    partName: "",
    description: "",
    satuan: "Unit",
    kategori: "Parts",
    asal: "Lokal",
    alasan: "",
    estimasiHarga: ""
  });
  const [prSearch, setPrSearch] = useState("");
  const myRequestsAll = isMekanik ? partRequests.filter(r => r.requesterUsername === session.username) : partRequests;
  const myRequests = prSearch.trim() ? myRequestsAll.filter(r => [r.id, r.partNumber, r.partName, r.requesterNama].filter(Boolean).some(x => String(x).toLowerCase().includes(prSearch.trim().toLowerCase()))) : myRequestsAll;
  const [reviewPR, setReviewPR] = useState(null);
  const [reviewPRForm, setReviewPRForm] = useState(null);
  const openReviewPR = r => {
    setReviewPR(r);
    setReviewPRForm({
      ...r
    });
  };
  const saveReviewPR = () => {
    const idx = partRequests.indexOf(reviewPR);
    if (idx < 0) return;
    const arr = [...partRequests];
    arr[idx] = {
      ...arr[idx],
      ...reviewPRForm,
      estimasiHarga: parseFloat(reviewPRForm.estimasiHarga) || 0
    };
    setPartRequests(arr);
    setReviewPR(arr[idx]);
    setReviewPRForm(arr[idx]);
  };
  const reviewPRApprove = () => {
    const idx = partRequests.indexOf(reviewPR);
    if (idx < 0) return;
    const arr = [...partRequests];
    const merged = {
      ...arr[idx],
      ...reviewPRForm,
      estimasiHarga: parseFloat(reviewPRForm.estimasiHarga) || 0
    };
    if (merged.status === "Menunggu Review Asil") {
      arr[idx] = {
        ...merged,
        status: "Menunggu Approval GM",
        reviewedBy: session.nama
      };
      setPartRequests(arr);
      logAudit(store, session, {
        module: "Request Part Baru",
        docNomor: merged.id,
        action: "Teruskan ke GM",
        detail: merged.partName
      });
    } else if (merged.status === "Menunggu Approval GM") {
      // Functional form — re-fetches the latest server parts list right before adding, so this
      // can't silently overwrite a part someone else added/edited elsewhere in the meantime.
      setParts(prev => prev.find(p => p.partNumber === merged.partNumber) ? prev : [...prev, {
        partNumber: merged.partNumber,
        partName: merged.partName,
        description: merged.description,
        satuan: merged.satuan,
        hargaBeli: merged.estimasiHarga,
        hargaJual: 0,
        stok: 0,
        kategori: merged.kategori,
        asal: merged.asal
      }]);
      arr[idx] = {
        ...merged,
        status: "Disetujui GM - Masuk Master Part",
        approvedBy: session.nama
      };
      setPartRequests(arr);
      logAudit(store, session, {
        module: "Request Part Baru",
        docNomor: merged.id,
        action: "Approve",
        detail: `${merged.partName} → ${merged.partNumber}`
      });
    }
    setReviewPR(null);
  };
  const reviewPRReject = () => {
    const reason = prompt("Alasan penolakan:");
