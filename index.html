const terbilang = n => {
  n = Math.round(Math.abs(n || 0));

  const eja = num => {
    num = Math.floor(num);
    if (num < 12) return satuan[num];
    if (num < 20) return eja(num - 10) + " Belas";
    if (num < 100) return eja(Math.floor(num / 10)) + " Puluh" + (num % 10 ? " " + eja(num % 10) : "");
    if (num < 200) return "Seratus" + (num % 100 ? " " + eja(num % 100) : "");
    if (num < 1000) return eja(Math.floor(num / 100)) + " Ratus" + (num % 100 ? " " + eja(num % 100) : "");
    if (num < 2000) return "Seribu" + (num % 1000 ? " " + eja(num % 1000) : "");
    if (num < 1000000) return eja(Math.floor(num / 1000)) + " Ribu" + (num % 1000 ? " " + eja(num % 1000) : "");

// Payment terms (COD/TEMPO) shared helper — used by Purchase Order and Invoice
function getDueStatus(tipePembayaran, tanggalJatuhTempo) {
  if (tipePembayaran === "COD") return {
    label: "COD",
    color: theme.cyan
  };
  if (!tanggalJatuhTempo) return {
    label: "Belum Jatuh Tempo",
    color: theme.muted
  };
  const due = new Date(tanggalJatuhTempo);
  const now = new Date(today());
  if (now > due) return {
    label: "Terlambat",
    color: theme.red
  };
  const diffDays = Math.ceil((due - now) / 86400000);
  if (diffDays <= 3) return {
    label: "Jatuh Tempo Segera",
    color: theme.yellow
  };
  return {
    label: "Belum Jatuh Tempo",
    color: theme.green
  };
}

// Backward-compat normalizer: older Part Recommendation records (pre-migration) were stored as
// 1 record per item ({ partNumber, partName, qty, alasan }) instead of 1 doc per visit with items[].
// This converts any legacy record on read so old localStorage data never crashes the new UI.
function normalizePartRec(r) {
  if (!r) return r;
  if (Array.isArray(r.items)) return r;
  return {
    ...r,
    items: [{
      partNumber: r.partNumber,
      partName: r.partName,
      qty: r.qty,
      alasan: r.alasan
    }]
  };
}
function normalizePartRecs(list) {
  return (list || []).map(normalizePartRec);
}

let _xlsxLoadPromise = null;
function loadXLSXLibrary() {
  if (typeof window !== "undefined" && window.XLSX) return Promise.resolve(window.XLSX);
  if (_xlsxLoadPromise) return _xlsxLoadPromise;

    script.onerror = () => reject(new Error("Gagal memuat library Excel. Pastikan ada koneksi internet."));
    document.head.appendChild(script);
  });
  return _xlsxLoadPromise;
}

// Export an array of row-objects (each object = 1 row, keys = column headers) to an .xlsx file
async function exportToExcel(rows, filename, sheetName = "Sheet1") {
  try {
    const XLSX = await loadXLSXLibrary();
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename.endsWith(".xlsx") ? filename : filename + ".xlsx");
  } catch (e) {
    alert("Gagal export: " + e.message);
  }
}

// Download an empty template with just header row, matching given column list
async function downloadTemplate(headers, filename) {
  try {
    const XLSX = await loadXLSXLibrary();
    const ws = XLSX.utils.aoa_to_sheet([headers]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Template");
    XLSX.writeFile(wb, filename.endsWith(".xlsx") ? filename : filename + ".xlsx");
  } catch (e) {
    alert("Gagal download template: " + e.message);
  }
}

  const def = ROLE_DEFS[role];

    passwordHash: await hashPassword(u.username + "123"),
    role: u.role,
    aktif: true
  })));
  const matrixUsers = await Promise.all(USER_DAN_AKSES_SEED.map(async u => ({
    id: "U" + uid(),

    username: u.username,
    passwordHash: await hashPassword(u.username + "123"),
    role: u.role,
    aktif: true,
    customModules: u.customModules
  })));
  return [...baseUsers, ...matrixUsers];
}

function usePersisted(key, defaultVal) {
  const [val, setValRaw] = useState(defaultVal);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    let cancelled = false;
    authReadyPromise.then(async () => {
      if (cancelled) return;
      try {
        const {
          data,
          error
        } = await sb.from("erp_data").select("data").eq("key", key).maybeSingle();
        if (cancelled) return;
        if (!error && data) {
          setValRaw(data.data);
        } else {
          // First time this key has ever been used — seed it with the default.
          await sb.from("erp_data").upsert({
            key,
            data: defaultVal,
            updated_at: new Date().toISOString()
          }, {
            onConflict: "key",
            ignoreDuplicates: true
          });
          if (!cancelled) setValRaw(defaultVal);
        }
      } finally {
        if (!cancelled) setLoaded(true);
      }
    });
    return () => {
      cancelled = true;
    };
  }, [key]);
  const setVal = v => {
    setValRaw(prev => {
      const next = typeof v === "function" ? v(prev) : v;
      sb.from("erp_data").upsert({
        key,
        data: next,
        updated_at: new Date().toISOString()
      }, {
        onConflict: "key"
      }).then(({
        error
      }) => {
        if (error) console.error("Gagal menyimpan " + key + ":", error);
      });
      return next;
    });
  };
  return [val, setVal, loaded];
}

// Generic helper: submit a pending change (add/edit/delete) for GM approval.
// module = "Database Client" | "Master Part"; action = "Tambah" | "Edit" | "Hapus"
function submitEditRequest(store, session, {
  module,
  action,
  targetId,
  targetLabel,
  payload
}) {
  const req = {
    id: "ER-" + uid(),
    module,
    action,
    targetId,
    targetLabel,
    payload,
    requestedBy: session.nama,
    tanggal: today(),
    status: "Menunggu Approval GM"
  };
  store.setEditRequests([...store.editRequests, req]);
